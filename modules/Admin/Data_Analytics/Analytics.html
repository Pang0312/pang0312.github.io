<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trev - Data Analytics</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="../../../shared/css/variables.css">
    <link rel="stylesheet" href="../../../shared/css/global.css">
    <link rel="stylesheet" href="../../../shared/css/header-footer.css">
    
    <link rel="stylesheet" href="Analytics.css">

    <script src="../../../shared/js/admin_main.js"></script>
</head>
<body data-page="analytics">

    <div id="header"></div>

    <main class="container admin-main">
        <div class="page-main-header">
            <div>
                <h1>Data Analytics</h1>
                <p>Track platform usage, popular destinations, and user engagement trends.</p>
            </div>
        </div>

        <div class="analytics-layout">
            <div class="chart-card full-width">
                <h3>Most Popular Destinations</h3>
                <div class="canvas-container bar-container">
                    <canvas id="popularDestChart"></canvas>
                </div>
            </div>

            <div class="grid-2-col">
                <div class="chart-card">
                    <h3>Top Rated Attractions</h3>
                    <div class="top-rated-list" id="topRatedList">
                        </div>
                </div>

                <div class="chart-card">
                    <div class="card-header-flex">
                        <h3>Popular Trip Combos</h3>
                        <select id="countryComboFilter" class="chart-filter">
                            <option value="">Loading...</option>
                        </select>
                    </div>
                    <div class="canvas-container pie-container">
                        <canvas id="combosChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="chart-card full-width">
                <h3>Trips Planned Over Time</h3>
                <div class="canvas-container line-container">
                    <canvas id="bookingsChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script src="Analytics.js"></script>
</body>
</html>

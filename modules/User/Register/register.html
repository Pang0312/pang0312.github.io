<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trev - Register</title>
        <link rel="stylesheet" href="../../../shared/css/variables.css">
        <link rel="stylesheet" href="../../../shared/css/global.css">
        <link rel="stylesheet" href="register.css">        
    </head>

    <body data-page="register">

        <main>
            <div class="container">
                <div class="register-card">
                <h2>Create Account</h2>
                    <form id="registerForm">
                        <label>Full Name</label>
                            <input type="text" id="fullName" name="username" placeholder="John Doe">
                            <small class="error" id="fullNameError"></small>

                        <label>Email Address</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com">
                            <small class="error" id="emailError"></small>

                        <label>Password</label>
                            <input type="password" id="password" name="password" placeholder="Enter your password" >
                            <small class="error" id="passwordError"></small>

                        <label>Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password">
                            <small class="error" id="confirmPasswordError"></small>

                        <div class="terms">
                            <input type="checkbox" id="terms">
                            <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                        </div>
                        <small class="error" id="termsError"></small>

                        <button type="submit">Register</button>
                    </form>

                    <p class="login">
                        Already have an account? <a href="../Login/login.html">Login here</a>
                    </p>

                </div>
            </div>
        </main>

        <script src="register.js"></script>
    </body>
</html>
